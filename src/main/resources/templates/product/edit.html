<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
</head>

<body>
<div layout:fragment="content" class="container body-content">

    <h2>Edit Product</h2>

    <form th:action="@{/products/update}" th:object="${product}" method="post" class="form">
        <input type="hidden" th:field="*{id}">

        <div class="form-group mb-3">
            <label for="name">Name:</label>
            <input class="form-control" type="text"
                   th:field="*{name}" id="name"
                   placeholder="Product Name">
        </div>

        <div class="form-group mb-3">
            <label for="image">Image URL:</label>
            <input class="form-control" type="text"
                   th:field="*{image}" id="image"
                   placeholder="http://image.jpg">
        </div>

        <div class="form-group mb-3">
            <label for="price">Price:</label>
            <input class="form-control" type="number"
                   th:field="*{price}" id="price"
                   placeholder="Price">
        </div>

        <div class="form-group mb-3">
            <label for="category">Category:</label>
            <select name="category.id" class="form-control" id="category">
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:selected="${product.category != null and product.category.id == cat.id}"
                        th:text="${cat.name}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Update Product</button>
        <a th:href="@{/products}" class="btn btn-secondary ms-2">Cancel</a>
    </form>

</div>
</body>
</html>
